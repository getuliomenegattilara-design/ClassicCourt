<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Court — Login</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563EB">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Classic Court">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --verde: #2563EB;
            --verde-dark: #1D4ED8;
            --bg: #DDE4EC;
            --surface: #FFFFFF;
            --surface2: #E8EDF3;
            --text: #1E293B;
            --muted: #64748B;
            --border: #CBD5E1;
        }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(44,62,80,0.12);
        }

        .logo-wrap {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-wrap .logo {
            width: 64px; height: 64px;
            background: var(--verde);
            border-radius: 16px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 32px;
            margin-bottom: 12px;
        }
        .logo-wrap h4 { margin: 0; font-weight: 800; font-size: 22px; }
        .logo-wrap span { color: var(--verde); font-size: 11px; font-weight: 600; letter-spacing: 1.5px; }

        .form-control {
            background: var(--surface2) !important;
            border-color: var(--border) !important;
            color: var(--text) !important;
            padding: 11px 14px;
            border-radius: 10px;
        }
        .form-control::placeholder { color: var(--muted) !important; }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(37,99,235,0.2) !important;
            border-color: var(--verde) !important;
        }
        .input-group-text {
            background: var(--surface2) !important;
            border-color: var(--border) !important;
            color: var(--muted) !important;
            border-radius: 10px 0 0 10px !important;
        }
        .input-group .form-control { border-radius: 0 10px 10px 0 !important; }

        .form-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }

        .btn-verde {
            background: var(--verde); border: none; color: #fff;
            font-weight: 700; border-radius: 10px; padding: 12px;
            font-size: 15px; width: 100%; transition: background 0.2s; cursor: pointer;
        }
        .btn-verde:hover { background: var(--verde-dark); }
        .btn-verde:disabled { opacity: 0.7; cursor: not-allowed; }

        .divider {
            display: flex; align-items: center; gap: 12px;
            color: var(--muted); font-size: 12px; margin: 20px 0;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .tab-btn {
            flex: 1; background: transparent; border: none;
            color: var(--muted); font-weight: 600; font-size: 14px;
            padding: 10px; border-bottom: 2px solid transparent;
            cursor: pointer; transition: all 0.2s;
        }
        .tab-btn.active { color: var(--verde); border-bottom-color: var(--verde); }

        .alert-ok  { background: rgba(37,99,235,0.1); border: 1px solid rgba(37,99,235,0.3); color: #1D4ED8; border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
        .alert-err { background: rgba(231,76,60,0.1);  border: 1px solid rgba(231,76,60,0.3);  color: #c0392b; border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }

        .link-btn { background: none; border: none; color: var(--verde); font-size: 13px; cursor: pointer; text-decoration: underline; padding: 0; }

        /* Overlay piada boas-vindas */
        #overlay-piada { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:9999; align-items:center; justify-content:center; padding:20px; }
        .piada-card { background:var(--surface); border:2px solid var(--verde); border-radius:22px; padding:36px 28px; max-width:380px; width:100%; text-align:center; box-shadow:0 20px 60px rgba(44,62,80,0.2); animation: popIn 0.4s cubic-bezier(.17,.67,.32,1.3); }
        @keyframes popIn { from { transform:scale(0.7); opacity:0; } to { transform:scale(1); opacity:1; } }
        .piada-emoji { font-size:52px; margin-bottom:12px; display:block; }
        .piada-texto { color:var(--text); font-size:14px; line-height:1.6; margin:12px 0 24px; min-height:60px; }
        .piada-dots { display:inline-flex; gap:6px; }
        .piada-dots span { width:8px; height:8px; border-radius:50%; background:var(--verde); animation:bounce 1.2s infinite; }
        .piada-dots span:nth-child(2) { animation-delay:.2s; }
        .piada-dots span:nth-child(3) { animation-delay:.4s; }
        @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }
    </style>
</head>
<body>
<div class="login-card">

    <div class="logo-wrap">
        <div class="logo">🎾</div>
        <h4>Classic Court</h4>
        <span>CLASSIC BOULEVARD</span>
    </div>

    <div id="alerta" style="display:none"></div>

    <!-- Tabs -->
    <div class="d-flex mb-4" style="border-bottom: 1px solid var(--border)">
        <button class="tab-btn active" id="tab-login-btn" onclick="mostrarTab('login')">Entrar</button>
        <button class="tab-btn" id="tab-cadastro-btn" onclick="mostrarTab('cadastro')">Criar conta</button>
    </div>

    <!-- LOGIN -->
    <div id="tab-login">
        <div class="mb-3">
            <label class="form-label">E-mail</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="login-email" placeholder="seu@email.com">
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Senha</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="login-senha" placeholder="••••••••" onkeydown="if(event.key==='Enter') fazerLogin()">
            </div>
        </div>
        <button class="btn-verde" onclick="fazerLogin()" id="btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i> Entrar
        </button>
        <div class="text-center mt-3">
            <button class="link-btn" onclick="mostrarTab('recuperar')">Esqueci minha senha</button>
        </div>
    </div>

    <!-- CADASTRO -->
    <div id="tab-cadastro" style="display:none">
        <div class="mb-3">
            <label class="form-label">Nome completo</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control" id="cad-nome" placeholder="Seu nome">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">E-mail</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="cad-email" placeholder="seu@email.com">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Senha</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="cad-senha" placeholder="Mínimo 6 caracteres">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Sexo</label>
            <div class="d-flex gap-3">
                <div class="form-check"><input class="form-check-input" type="radio" name="cad-sexo" id="cad-sexo-m" value="M" checked><label class="form-check-label" for="cad-sexo-m" style="font-size:13px">Masculino</label></div>
                <div class="form-check"><input class="form-check-input" type="radio" name="cad-sexo" id="cad-sexo-f" value="F"><label class="form-check-label" for="cad-sexo-f" style="font-size:13px">Feminino</label></div>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Apelido <span style="color:var(--muted);font-size:10px;text-transform:none;letter-spacing:normal">(opcional)</span></label>
            <input type="text" class="form-control" id="cad-apelido" placeholder="Ex: O Slice Master">
        </div>
        <div class="mb-3">
            <label class="form-label">Meu estilo no court <span style="color:var(--muted);font-size:10px;text-transform:none;letter-spacing:normal">(opcional, pode marcar vários)</span></label>
            <div id="cad-caract" style="display:flex;flex-wrap:wrap;gap:5px"></div>
        </div>
        <div class="mb-4">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="cad-fofoqueiro">
                <label class="form-check-label" for="cad-fofoqueiro" style="font-size:13px"><i class="bi bi-bell me-1" style="color:var(--verde)"></i> Receber email de todos os jogos do condomínio</label>
            </div>
        </div>
        <button class="btn-verde" onclick="fazerCadastro()" id="btn-cadastro">
            <i class="bi bi-person-plus me-2"></i> Criar conta
        </button>
    </div>

    <!-- RECUPERAR SENHA -->
    <div id="tab-recuperar" style="display:none">
        <p style="color:var(--muted);font-size:13px;margin-bottom:16px">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>
        <div class="mb-4">
            <label class="form-label">E-mail</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="rec-email" placeholder="seu@email.com">
            </div>
        </div>
        <button class="btn-verde" onclick="recuperarSenha()" id="btn-recuperar">
            <i class="bi bi-send me-2"></i> Enviar link
        </button>
        <div class="text-center mt-3">
            <button class="link-btn" onclick="mostrarTab('login')"><i class="bi bi-arrow-left me-1"></i>Voltar</button>
        </div>
    </div>

    <!-- REDEFINIR SENHA -->
    <div id="tab-redefinir" style="display:none">
        <p style="color:var(--muted);font-size:13px;margin-bottom:16px">Digite sua nova senha.</p>
        <div class="mb-3">
            <label class="form-label">Nova senha</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="nova-senha" placeholder="Minimo 6 caracteres">
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Confirmar senha</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="confirma-senha" placeholder="Repita a senha">
            </div>
        </div>
        <button class="btn-verde" onclick="redefinirSenha()" id="btn-redefinir">
            <i class="bi bi-check-circle me-2"></i> Salvar nova senha
        </button>
    </div>

</div>

<!-- Overlay piada boas-vindas -->
<div id="overlay-piada">
    <div class="piada-card">
        <span class="piada-emoji">🎾</span>
        <h5 style="color:var(--verde);font-weight:800;margin:0 0 4px" id="piada-titulo">Bem-vindo ao court!</h5>
        <p style="color:var(--muted);font-size:12px;margin:0 0 12px">Um recado especial da IA do clube...</p>
        <div class="piada-texto" id="piada-texto">
            <div class="piada-dots"><span></span><span></span><span></span></div>
        </div>
        <button class="btn-verde" id="btn-entrar-court" onclick="entrarNoCourt()" disabled style="opacity:0.5;cursor:not-allowed">
            <i class="bi bi-door-open me-2"></i> Entrar no court!
        </button>
    </div>
</div>

<script src="config.js"></script>
<script>

const CARACT_CAD = [
    {id:'slice',     emoji:'🎯', label:'Só dou slice'},
    {id:'baloeiro',  emoji:'🎈', label:'Sou baloeiro'},
    {id:'catimba',   emoji:'😈', label:'Gosto de catimba'},
    {id:'sol_vento', emoji:'☀️', label:'A culpa é do sol/vento'},
    {id:'reclama',   emoji:'😤', label:'Reclamo de tudo'},
    {id:'conta',     emoji:'🤔', label:'Conto games errado'},
    {id:'devagar',   emoji:'🐢', label:'Demoro entre pontos'},
    {id:'wimbledon', emoji:'🏆', label:'Celebro como Wimbledon'},
    {id:'out',       emoji:'👂', label:'Não ouço o out'},
    {id:'raquete',   emoji:'🤬', label:'Quebraria a raquete'},
    {id:'ace',       emoji:'💨', label:'Especialista em dupla falta'},
];

function renderCaractCad() {
    const sel = new Set();
    document.getElementById('cad-caract').innerHTML = CARACT_CAD.map(c =>
        `<span class="badge-caract" data-id="${c.id}" onclick="toggleCaractCad(this)"
            style="background:rgba(37,99,235,0.12);color:var(--verde);border:1px solid rgba(37,99,235,0.3);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;cursor:pointer">${c.emoji} ${c.label}</span>`
    ).join('');
}
function toggleCaractCad(span) {
    const ativo = span.classList.toggle('ativo');
    span.style.background = ativo ? 'rgba(37,99,235,0.3)' : 'rgba(37,99,235,0.12)';
    span.style.borderColor = ativo ? 'var(--verde)' : 'rgba(37,99,235,0.3)';
}
function getCaractCad() {
    return [...document.querySelectorAll('#cad-caract .badge-caract.ativo')].map(s => s.dataset.id);
}
renderCaractCad();

// Log de abertura
logApp('login', 'App aberto', { ua: navigator.userAgent, url: location.href });

// Exibe mensagem de sessão expirada se vier redirecionado
const msgLogin = localStorage.getItem('cc_msg_login');
if (msgLogin) { alerta('erro', msgLogin); localStorage.removeItem('cc_msg_login'); }

// Verifica se ja esta logado
const session = JSON.parse(localStorage.getItem('cc_session') || 'null');
if (session && session.access_token) {
    window.location.href = 'index.html';
}

function mostrarTab(tab) {
    document.getElementById('tab-login').style.display     = 'none';
    document.getElementById('tab-cadastro').style.display  = 'none';
    document.getElementById('tab-recuperar').style.display = 'none';
    document.getElementById('tab-redefinir').style.display = 'none';
    document.getElementById('tab-login-btn').classList.remove('active');
    document.getElementById('tab-cadastro-btn').classList.remove('active');

    document.getElementById('tab-' + tab).style.display = '';
    if (tab === 'login' || tab === 'recuperar' || tab === 'redefinir') document.getElementById('tab-login-btn').classList.add('active');
    if (tab === 'cadastro') document.getElementById('tab-cadastro-btn').classList.add('active');
    document.getElementById('alerta').style.display = 'none';
}

function alerta(tipo, msg) {
    const el = document.getElementById('alerta');
    el.className = tipo === 'ok' ? 'alert-ok' : 'alert-err';
    el.innerHTML = `<i class="bi bi-${tipo==='ok'?'check-circle-fill':'exclamation-triangle-fill'} me-2"></i>${msg}`;
    el.style.display = '';
}

async function authFetch(path, body) {
    const res = await fetch(`${SUPA_URL}/auth/v1/${path}`, {
        method: 'POST',
        headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Erro desconhecido');
    return data;
}

async function fazerLogin() {
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;
    if (!email || !senha) { alerta('erro', 'Preencha e-mail e senha.'); return; }
    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando...';
    try {
        const data = await authFetch('token?grant_type=password', { email, password: senha });
        localStorage.setItem('cc_session', JSON.stringify({ access_token: data.access_token, user: data.user }));
        logApp('login', 'Login efetuado', { email });
        window.location.href = 'index.html';
    } catch(e) {
        logApp('login', 'Falha de login', { email });
        alerta('erro', 'E-mail ou senha incorretos.');
    } finally {
        btn.disabled = false; btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i> Entrar';
    }
}

async function fazerCadastro() {
    const nome  = document.getElementById('cad-nome').value.trim();
    const email = document.getElementById('cad-email').value.trim();
    const senha = document.getElementById('cad-senha').value;
    const sexo  = document.querySelector('input[name="cad-sexo"]:checked')?.value || 'M';
    const apelido = document.getElementById('cad-apelido').value.trim();
    const fofoqueiro = document.getElementById('cad-fofoqueiro').checked;
    const caracteristicas = getCaractCad();
    if (!nome)         { alerta('erro', 'Informe seu nome.'); return; }
    if (!email)        { alerta('erro', 'Informe seu e-mail.'); return; }
    if (senha.length < 6) { alerta('erro', 'Senha deve ter pelo menos 6 caracteres.'); return; }
    const btn = document.getElementById('btn-cadastro');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Criando conta...';
    try {
        // Verifica nome duplicado antes de criar conta (fetch direto, sem sessão)
        const _r = await fetch(`${SUPA_URL}/rest/v1/jogadores?select=nome`, { headers: { 'apikey': SUPA_KEY } });
        const existentes = _r.ok ? await _r.json() : [];
        const duplicado  = existentes.find(j => j.nome.trim().toLowerCase() === nome.toLowerCase());
        if (duplicado) { alerta('erro', `Ja existe um jogador chamado "${duplicado.nome}". Use seu nome completo ou adicione o sobrenome.`); return; }

        const data = await authFetch('signup', { email, password: senha, data: { nome } });

        if (!data.access_token) {
            alerta('ok', 'Conta criada! Verifique seu e-mail para confirmar antes de entrar.');
            return;
        }

        localStorage.setItem('cc_session', JSON.stringify({ access_token: data.access_token, user: data.user }));

        // Cria jogador usando o token diretamente (sem supaFetch para evitar checagem de sessão)
        const payload = { nome, email, user_id: data.user.id, sexo, fofoqueiro, caracteristicas };
        if (apelido) payload.apelido = apelido;
        const jogRes = await fetch(`${SUPA_URL}/rest/v1/jogadores`, {
            method: 'POST',
            headers: {
                'apikey': SUPA_KEY,
                'Authorization': `Bearer ${data.access_token}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify(payload)
        });
        if (!jogRes.ok) {
            const jogErr = await jogRes.json().catch(() => ({}));
            throw new Error('Conta criada mas erro ao criar jogador: ' + (jogErr.message || jogErr.error || jogRes.status));
        }

        // Mostra overlay com piada personalizada
        mostrarOverlayPiada(nome);
    } catch(e) {
        alerta('erro', e.message);
    } finally {
        btn.disabled = false; btn.innerHTML = '<i class="bi bi-person-plus me-2"></i> Criar conta';
    }
}

// Detecta token de reset na URL (query string ou hash)
let _resetTokenHash = null;
(function() {
    const params = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams(window.location.hash.substring(1));

    if (params.get('type') === 'recovery' && params.get('token_hash')) {
        _resetTokenHash = params.get('token_hash');
        mostrarTab('redefinir');
    } else if (hashParams.get('type') === 'recovery' && hashParams.get('access_token')) {
        _resetTokenHash = hashParams.get('access_token');
        mostrarTab('redefinir');
    }
})();

async function redefinirSenha() {
    const nova = document.getElementById('nova-senha').value;
    const confirma = document.getElementById('confirma-senha').value;
    if (nova.length < 6) { alerta('erro', 'Senha deve ter pelo menos 6 caracteres.'); return; }
    if (nova !== confirma) { alerta('erro', 'As senhas nao conferem.'); return; }
    const btn = document.getElementById('btn-redefinir');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Salvando...';
    try {
        // Primeiro verifica o token pra obter session
        const verifyRes = await fetch(SUPA_URL + '/auth/v1/verify', {
            method: 'POST',
            headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'recovery', token_hash: _resetTokenHash })
        });
        if (!verifyRes.ok) {
            const err = await verifyRes.json();
            alerta('erro', err.error_description || err.msg || 'Link expirado. Solicite novo.');
            return;
        }
        const session = await verifyRes.json();
        const accessToken = session.access_token;

        // Atualiza a senha
        const res = await fetch(SUPA_URL + '/auth/v1/user', {
            method: 'PUT',
            headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: nova })
        });
        if (res.ok) {
            alerta('ok', 'Senha alterada com sucesso! Faca login com a nova senha.');
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
        } else {
            const err = await res.json();
            alerta('erro', err.error_description || err.msg || 'Erro ao alterar senha.');
        }
    } catch(e) {
        alerta('erro', 'Erro: ' + e.message);
    } finally {
        btn.disabled = false; btn.innerHTML = '<i class="bi bi-check-circle me-2"></i> Salvar nova senha';
    }
}

const isWebView = /wv|WebView/.test(navigator.userAgent) || (window.Android !== undefined);
if ('serviceWorker' in navigator && !isWebView) navigator.serviceWorker.register('sw.js');

function entrarNoCourt() { window.location.href = 'index.html'; }

async function mostrarOverlayPiada(nome) {
    const overlay = document.getElementById('overlay-piada');
    document.getElementById('piada-titulo').textContent = 'Bem-vindo, ' + nome.split(' ')[0] + '!';
    overlay.style.display = 'flex';

    // Timeout de segurança: libera o botão em 8s mesmo se Gemini demorar
    const timer = setTimeout(() => {
        document.getElementById('piada-texto').textContent = 'Seja bem-vindo ao Classic Court! Boas raquetadas! 🎾';
        liberarBotaoPiada();
    }, 8000);

    const prompt = `Faça uma piada curta e bem humorada de tênis sobre alguém chamado ${nome} que acabou de entrar num app de tênis do condomínio. Use o nome na piada. Máximo 2 frases engraçadas. Escreva em português brasileiro informal.`;
    const piada = await geminiCall(prompt);
    clearTimeout(timer);
    document.getElementById('piada-texto').textContent = piada || `${nome.split(' ')[0]}, o court vai tremer quando você aparecer! 🎾`;
    liberarBotaoPiada();
}

function liberarBotaoPiada() {
    const btn = document.getElementById('btn-entrar-court');
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.style.cursor = 'pointer';
}

async function recuperarSenha() {
    const email = document.getElementById('rec-email').value.trim();
    if (!email) { alerta('erro', 'Informe seu e-mail.'); return; }
    const btn = document.getElementById('btn-recuperar');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Enviando...';
    try {
        await fetch(`${SUPA_URL}/auth/v1/recover`, {
            method: 'POST',
            headers: { 'apikey': SUPA_KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, redirectTo: 'https://getuliomenegattilara-design.github.io/ClassicCourt/login.html' })
        });
        alerta('ok', 'Link enviado! Verifique seu e-mail.');
    } catch(e) {
        alerta('erro', 'Erro ao enviar e-mail.');
    } finally {
        btn.disabled = false; btn.innerHTML = '<i class="bi bi-send me-2"></i> Enviar link';
    }
}
</script>
</body>
</html>
